---
- name: Install Wezterm
  hosts: localhost
  connection: local
  tasks:
    - name: Ensure Wezterm config directory is present
      ansible.builtin.file:
        path: ~/.config/wezterm
        state: directory
        mode: "0755"
      tags:
        - wezterm

    - name: Copy wezterm config file into place
      ansible.builtin.copy:
        src: files/wezterm.lua
        dest: ~/.config/wezterm/wezterm.lua
        mode: "0644"
      tags:
        - wezterm

