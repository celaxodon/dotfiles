---
- name: Install language learning tools and utilities
  hosts: localhost
  connection: local
  tags:
    - linux
  tasks:
    - name: Add Flathub remote
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install GoldenDict-ng
      community.general.flatpak:
        name: io.github.xiaoyifang.goldendict_ng
        remote: flathub
        state: present

    - name: Install Anki-related dependencies
      ansible.builtin.package:
        name:
          - ffmpeg
        state: latest
      become: true

    # TODO: Install dictionaries

    - name: Install Anki
      community.general.flatpak:
        name: net.ankiweb.Anki
        remote: flathub
        state: present

    - name: Check if Sarasa Gothic fonts are already installed
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.local/share/fonts/SarasaGothic/Sarasa-Regular.ttf"
      register: sarasa_font

    - name: Download Sarasa Gothic TTF fonts
      ansible.builtin.get_url:
        url: https://github.com/be5invis/Sarasa-Gothic/releases/download/v1.0.37/SarasaGothic-TTF-1.0.37.7z
        dest: /tmp/SarasaGothic-TTF.7z
        mode: "0644"
      when: not sarasa_font.stat.exists

    - name: Create user fonts directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.local/share/fonts/SarasaGothic"
        state: directory
        mode: "0755"

    - name: Extract Sarasa Gothic fonts
      ansible.builtin.command:
        cmd: 7z e /tmp/SarasaGothic-TTF.7z -o{{ ansible_env.HOME }}/.local/share/fonts/SarasaGothic -y
      when: not sarasa_font.stat.exists

    - name: Install Japanese keyboard support
      ansible.builtin.package:
        name:
          - mozc-utils-gui
          - ibus-mozc
          - fonts-noto-cjk
        state: latest
      become: true

    - name: Create fontconfig directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config/fontconfig"
        state: directory
        mode: "0755"

    - name: Set Sarasa Gothic as default Japanese font
      ansible.builtin.copy:
        dest: "{{ ansible_env.HOME }}/.config/fontconfig/fonts.conf"
        mode: "0644"
        content: |
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <match>
              <test name="lang" compare="contains">
                <string>ja</string>
              </test>
              <edit name="family" mode="prepend">
                <string>Sarasa Gothic J</string>
              </edit>
            </match>
          </fontconfig>

    - name: Refresh font cache
      ansible.builtin.command:
        cmd: fc-cache -f "{{ ansible_env.HOME }}/.local/share/fonts/SarasaGothic"
      changed_when: false
