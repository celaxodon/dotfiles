---
- name: Install language learning tools and utilities
  hosts: localhost
  connection: local
  tags:
    - linux
  tasks:
    - name: Add Flathub remote
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install GoldenDict-ng
      community.general.flatpak:
        name: io.github.xiaoyifang.goldendict_ng
        remote: flathub
        state: present

    - name: Install Anki-related dependencies
      ansible.builtin.package:
        name:
          - ffmpeg
        state: latest
      become: true

    # TODO: Install dictionaries

    - name: Install Anki
      community.general.flatpak:
        name: net.ankiweb.Anki
        remote: flathub
        state: present

    - name: Create user fonts directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.local/share/fonts"
        state: directory
        mode: "0755"

    - name: Install Japanese keyboard support
      ansible.builtin.package:
        name:
          - mozc-utils-gui
          - ibus-mozc
          - fonts-noto-cjk
        state: latest
      become: true

    - name: Create fontconfig directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config/fontconfig"
        state: directory
        mode: "0755"

    - name: Set Noto Sans JP as default Japanese font
      ansible.builtin.copy:
        dest: "{{ ansible_env.HOME }}/.config/fontconfig/fonts.conf"
        mode: "0644"
        content: |
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <match>
              <test name="lang" compare="contains">
                <string>ja</string>
              </test>
              <edit name="family" mode="prepend">
                <string>Noto Sans CJK JP</string>
              </edit>
            </match>
          </fontconfig>

    - name: Refresh font cache
      ansible.builtin.command:
        cmd: fc-cache -f "{{ ansible_env.HOME }}/.local/share/fonts"
      changed_when: false
