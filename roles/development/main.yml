---
- name: Install dotfiles
  hosts: localhost
  connection: local
  tasks:
    - name: Install tmux, git, zsh
      ansible.builtin.package:
        name:
          - git
          - tmux
          - zsh
        state: latest
      become: true
      tags:
        - utils

    - name: Install other utilities
      ansible.builtin.package:
        name:
          - ripgrep
          - fd-find
          - fswatch
          - curl
          - bat
          - fzf
        state: latest
      become: true
      tags:
        - utils

    - name: Create ~/bin directory if it doesn't exist
      file:
        path: ~/bin
        state: directory
        mode: '0755'
      tags:
        - utils

    - name: Check if batcat exists
      stat:
        path: /usr/bin/batcat
      register: batcat_exists
      tags:
        - utils

    - name: Create a symlink for bat if it is installed as batcat
      file:
        src: /usr/bin/batcat
        dest: ~/bin/bat
        state: link
      when: batcat_exists.stat.exists
      tags:
        - utils

      # No git-p4 package on Ubuntu 24.04 machine
    - name: Download git-p4 script
      get_url:
        url: https://raw.githubusercontent.com/git/git/master/git-p4.py
        dest: ~/bin/git-p4
        mode: '0755'
      tags:
        - utils

    - name: Ensure git-p4 is executable
      file:
        path: ~/bin/git-p4
        mode: '0755'
        state: file
      tags:
        - utils

    - name: Copy zsh config files into place
      ansible.builtin.copy:
        src: files/zshrc
        dest: ~/.zshrc
        mode: "0644"
      tags:
        - zsh

    - name: Check if oh-my-zsh install exists
      stat:
        path: ~/.oh-my-zsh
      register: oh_my_zsh_exists
      tags:
        - zsh
        - utils

    - name: Download oh-my-zsh installer
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
        dest: /tmp/install-oh-my-zsh.sh
        mode: "0755"
      when: not oh_my_zsh_exists.stat.exists
      tags:
        - zsh
        - utils

    - name: Install oh-my-zsh
      ansible.builtin.shell: bash /tmp/install-oh-my-zsh.sh
      when: not oh_my_zsh_exists.stat.exists
      tags:
        - zsh
        - utils

    - name: Ensure tmux config folder is present
      ansible.builtin.file:
        path: ~/.tmux
        state: directory
        mode: "0755"
      tags:
        - tmux
        - utils

    - name: Copy main tmux config file into place
      ansible.builtin.copy:
        src: files/tmux.conf
        dest: ~/.tmux/tmux.conf
        mode: "0644"
      tags:
        - tmux
        - utils

    - name: Copy tmux status line config into place
      ansible.builtin.copy:
        src: files/tmux_status_bar.conf
        dest: ~/.tmux/tmux_status_bar.conf
        mode: "0644"
      tags:
        - tmux
        - utils

    - name: Copy tmux startup script into place
      ansible.builtin.copy:
        src: files/tmux_startup.sh
        dest: ~/.tmux/startup.sh
        mode: "0755"
      tags:
        - tmux
        - utils

    - name: Copy global gitignore file
      ansible.builtin.copy:
        src: files/gitignore_global
        dest: ~/.gitignore_global
        mode: "0644"
      tags:
        - utils

- name: Install programming languages
  ansible.builtin.import_playbook: languages.yml

- name: Include (neo)vim tasks
  ansible.builtin.import_playbook: vim.yml

