---
- name: Install dotfiles
  hosts: localhost
  connection: local
  tasks:
    - name: Install tmux, git, zsh
      ansible.builtin.package:
        name:
          - git
          - tmux
          - zsh
        state: latest
      become: true

    - name: Install other utilities
      ansible.builtin.package:
        name:
          - ripgrep
          - fd-find
          - fswatch
          - curl
        state: latest
      become: true

    - name: Copy zsh config files into place
      ansible.builtin.copy:
        src: files/zshrc
        dest: ~/.zshrc
        mode: "0644"
      tags:
        - zsh

    - name: Download oh-my-zsh installer
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
        dest: /tmp/install-oh-my-zsh.sh
        mode: "0755"
      tags:
        - zsh

    - name: Install oh-my-zsh
      ansible.builtin.shell: bash /tmp/install-oh-my-zsh.sh
      tags:
        - zsh

    - name: Ensure tmux config folder is present
      ansible.builtin.file:
        path: ~/.tmux
        state: directory
        mode: "0755"
      tags:
        - tmux

    - name: Copy main tmux config file into place
      ansible.builtin.copy:
        src: files/tmux.conf
        dest: ~/.tmux/tmux.conf
        mode: "0644"
      tags:
        - tmux

    - name: Copy tmux status line config into place
      ansible.builtin.copy:
        src: files/tmux_status_bar.conf
        dest: ~/.tmux/tmux_status_bar.conf
        mode: "0644"
      tags:
        - tmux

    - name: Copy tmux startup script into place
      ansible.builtin.copy:
        src: files/tmux_startup.sh
        dest: ~/.tmux/startup.sh
        mode: "0755"
      tags:
        - tmux

    - name: Copy global gitignore file
      ansible.builtin.copy:
        src: files/gitignore_global
        dest: ~/.gitignore_global
        mode: "0644"

    - name: Ensure ~/.ctags directory is present
      ansible.builtin.file:
        path: ~/.ctags
        state: directory
        mode: "0755"

    # TODO: Install asdf -- standalone play

    - name: Copy elixir ctags file into place
      ansible.builtin.copy:
        src: files/elixir.ctags
        dest: ~/.ctags/elixir.ctags
        mode: "0644"

- name: Install programming languages
  ansible.builtin.import_playbook: languages.yml

- name: Include (neo)vim tasks
  ansible.builtin.import_playbook: vim.yml

