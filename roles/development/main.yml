---
- name: Install dotfiles
  hosts: localhost
  connection: local
  tasks:
    - name: Install tmux, git, zsh
      ansible.builtin.package:
        name:
          - git
          - tmux
          - zsh
          # - lua5.4    # TODO: Move this out to an asdf playbook
          # TODO: Install liblua5.4-dev for header files
          # TODO: Install luarocks
        state: latest
      become: true

    - name: Install other utilities
      ansible.builtin.package:
        name:
          - ripgrep
          - fd-find
          - fswatch
          - curl
        state: latest
      become: true

    - name: Copy zsh config files into place
      ansible.builtin.copy:
        src: files/zshrc
        dest: ~/.zshrc
        mode: "0644"
      tags:
        - zsh


    - name: Ensure tmux config folder is present
      ansible.builtin.file:
        path: ~/.tmux
        state: directory
        mode: "0755"
      tags:
        - tmux

    - name: Copy main tmux config file into place
      ansible.builtin.copy:
        src: files/tmux.conf
        dest: ~/.tmux/tmux.conf
        mode: "0644"
      tags:
        - tmux

    - name: Copy tmux status line config into place
      ansible.builtin.copy:
        src: files/tmux_status_bar.conf
        dest: ~/.tmux/tmux_status_bar.conf
        mode: "0644"
      tags:
        - tmux

    - name: Copy tmux startup script into place
      ansible.builtin.copy:
        src: files/tmux_startup.sh
        dest: ~/.tmux/startup.sh
        mode: "0755"
      tags:
        - tmux

    - name: Copy global gitignore file
      ansible.builtin.copy:
        src: files/gitignore_global
        dest: ~/.gitignore_global
        mode: "0644"

    - name: Ensure ~/.ctags directory is present
      ansible.builtin.file:
        path: ~/.ctags
        state: directory
        mode: "0755"

    # TODO: install oh-my-zsh
    # TODO: Install asdf -- standalone play
    # TODO: Install rustup
    # $ curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh

    - name: Copy elixir ctags file into place
      ansible.builtin.copy:
        src: files/elixir.ctags
        dest: ~/.ctags/elixir.ctags
        mode: "0644"

- name: Include (neo)vim tasks
  ansible.builtin.import_playbook: vim.yml

