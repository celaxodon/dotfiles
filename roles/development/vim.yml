---
- name: Install (neo)vim
  hosts: localhost
  connection: local
  vars:
    nvim_version: v0.9.5
  tasks:
    - name: Install vim
      ansible.builtin.package:
        name:
          - vim
        state: latest
      become: true

    # TODO: Install neovim
    # 2. install to ~/bin/neovim.appimage
    # 3. ensure alias is created

    # TODO: Install/update rust
    # TODO: Install rust-analyzer (see https://rust-analyzer.github.io/manual.html#rust-analyzer-language-server-binary)
    # or maybe $ rustup component add rust-analyzer
      # TODO: install rust src ($ rustup component add rust-src)

    - name: Download neovim
      ansible.builtin.get_url:
        url: https://github.com/neovim/neovim/releases/download/{{ nvim_version}}/nvim.appimage
        dest: /tmp/nvim-{{ nvim_version}}.appimage
        checksum: sha256:0c82e5702af7a11fbb916a11b4a82e98928abf8266c74b2030ea740340437bf9
      tags:
        - vim

    - name: Copy nvim appimage to ~/bin
      ansible.builtin.copy:
        src: /tmp/nvim-{{ nvim_version }}.appimage
        dest: ~/bin/nvim-{{ nvim_version }}.appimage
        mode: "0755"
      tags:
        - vim

    - name: Create nvim symlink in ~/bin
      ansible.builtin.file:
        src: ~/bin/nvim-{{ nvim_version }}.appimage
        dest: ~/bin/nvim
        state: link
        force: true
      tags:
        - vim

    - name: Ensure neovim config directory structure exists
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - ~/.config/nvim/lua/plugins
        - ~/.config/nvim/lua/config
      tags:
        - vim

    # TODO: consider removing when adding init.lua
    - name: Get this project's poetry venv location
      ansible.builtin.shell: set -o pipefail; poetry env list --full-path | grep 'Activated' | cut -d ' ' -f 1
      register: poetry_venv_location
      tags:
        - vim

    - name: Print poetry venv location
      ansible.builtin.debug:
        msg: "{{ poetry_venv_location.stdout }}"

    - name: Insert poetry venv location in nvim config file
      ansible.builtin.set_fact:
        python3_venv_loc: "{{ poetry_venv_location.stdout }}/"
      tags:
        - vim
    - name: (legacy) Copy vim config files into place
      ansible.builtin.copy:
        src: roles/development/files/vimrc
        dest: ~/.vim/vimrc
        mode: "0644"
      tags:
        - vim

    - name: Create neovim config directory
      ansible.builtin.file:
        path: ~/.config/nvim
        state: directory
        mode: "0755"
      tags:
        - vim

    - name: Copy neovim config file into place
      ansible.builtin.template:
        src: roles/development/templates/init.vim.j2
        dest: ~/.config/nvim/init.vim
        mode: "0644"
      tags:
        - vim
